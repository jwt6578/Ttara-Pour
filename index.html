<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ttara-Pour Recipe Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', 'Pretendard', sans-serif; 
            background-color: #09090b; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(63, 63, 70, 0.5);
        }
        
        .graph-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
        }
        
        .temp-gradient {
            background: linear-gradient(90deg, #3b82f6 0%, #10b981 40%, #f59e0b 70%, #ef4444 100%);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden relative text-sm sm:text-base">

    <!-- 상단 헤더 -->
    <header class="glass-panel px-4 sm:px-6 py-3 sm:py-4 flex justify-between items-center shrink-0 sticky top-0 z-40 border-b border-zinc-800">
        <div class="flex items-center gap-2 sm:gap-4">
            <!-- 모바일용 필터 토글 버튼 -->
            <button onclick="toggleMobileSidebar()" class="lg:hidden p-2 text-zinc-400 hover:text-white rounded-lg bg-zinc-800/50 border border-zinc-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="w-8 h-8 sm:w-10 sm:h-10 bg-indigo-500/20 rounded-xl flex items-center justify-center border border-indigo-500/30 text-indigo-400 shrink-0">
                <span class="text-lg sm:text-xl">☁️</span>
            </div>
            <div>
                <h1 class="text-base sm:text-xl font-bold text-white tracking-tight leading-tight">Ttara-Pour Recipe Cloud</h1>
                <p class="text-[10px] sm:text-xs text-zinc-400 font-medium hidden sm:block">전 세계 바리스타들의 커피 추출 레시피 따라하기</p>
            </div>
        </div>

        <div class="flex items-center gap-2 sm:gap-4 shrink-0">
            <button onclick="window.location.href='admin.html'" class="text-xs text-zinc-500 hover:text-zinc-300 hidden md:block">관리자</button>
            <button onclick="openShareModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 sm:px-5 py-2 sm:py-2.5 rounded-full text-xs sm:text-sm font-bold transition-all shadow-lg flex items-center gap-1 sm:gap-2 active:scale-95">
                <span>공유하기</span> <span class="hidden sm:inline">✍️</span>
            </button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden relative">
        
        <!-- 왼쪽 사이드바 (필터) : 모바일에서는 오버레이로 작동 -->
        <div id="mobile-sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden" onclick="toggleMobileSidebar()"></div>
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 glass-panel border-r border-zinc-800 p-5 flex flex-col gap-6 overflow-y-auto transform -translate-x-full transition-transform duration-300 lg:translate-x-0 lg:static lg:block bg-zinc-900/95 lg:bg-transparent">
            
            <div class="flex justify-between items-center lg:hidden mb-2">
                <h2 class="font-bold text-white">필터 옵션</h2>
                <button onclick="toggleMobileSidebar()" class="text-zinc-400 hover:text-white p-1">✖</button>
            </div>

            <div>
                <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3">추출 도구 (기물)</h3>
                <div class="flex flex-col gap-3 sm:gap-2" id="filter-dripper">
                    <label class="flex items-center gap-2 text-sm text-zinc-300 hover:text-white cursor-pointer"><input type="checkbox" value="V60" class="accent-indigo-500 w-4 h-4"> Hario V60</label>
                    <label class="flex items-center gap-2 text-sm text-zinc-300 hover:text-white cursor-pointer"><input type="checkbox" value="Kalita" class="accent-indigo-500 w-4 h-4"> Kalita Wave</label>
                    <label class="flex items-center gap-2 text-sm text-zinc-300 hover:text-white cursor-pointer"><input type="checkbox" value="Aeropress" class="accent-indigo-500 w-4 h-4"> Aeropress</label>
                    <label class="flex items-center gap-2 text-sm text-zinc-300 hover:text-white cursor-pointer"><input type="checkbox" value="Espresso" class="accent-indigo-500 w-4 h-4"> Espresso</label>
                </div>
            </div>

            <div class="mt-2 lg:mt-0">
                <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3">추출 온도 (물)</h3>
                <div class="flex flex-col gap-3 sm:gap-2" id="filter-temp">
                    <label class="flex items-center gap-2 text-sm text-red-300 hover:text-red-200 cursor-pointer"><input type="checkbox" value="hot90" class="accent-red-500 w-4 h-4"> 90°C 이상 (고온)</label>
                    <label class="flex items-center gap-2 text-sm text-orange-300 hover:text-orange-200 cursor-pointer"><input type="checkbox" value="hot80" class="accent-orange-500 w-4 h-4"> 80°C대 (중고온)</label>
                    <label class="flex items-center gap-2 text-sm text-yellow-300 hover:text-yellow-200 cursor-pointer"><input type="checkbox" value="mid70" class="accent-yellow-500 w-4 h-4"> 70°C대 (중온)</label>
                    <label class="flex items-center gap-2 text-sm text-emerald-300 hover:text-emerald-200 cursor-pointer"><input type="checkbox" value="low70" class="accent-emerald-500 w-4 h-4"> 70°C 미만 (저온)</label>
                    <label class="flex items-center gap-2 text-sm text-blue-300 hover:text-blue-200 cursor-pointer"><input type="checkbox" value="cold" class="accent-blue-500 w-4 h-4"> 상온 추출 (Cold)</label>
                </div>
            </div>

            <button onclick="resetFilters()" class="mt-6 lg:mt-auto bg-zinc-800 hover:bg-zinc-700 text-white py-3 lg:py-2 rounded-lg text-sm font-medium transition-colors border border-zinc-700">
                필터 초기화
            </button>
        </aside>

        <!-- 메인 컨텐츠 영역 -->
        <main class="flex-1 overflow-y-auto p-4 sm:p-6 bg-black/40">
            <div class="flex justify-between items-center mb-4 sm:mb-6">
                <h2 class="text-base sm:text-lg font-bold text-white">🔥 커뮤니티 인기 레시피</h2>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-4 sm:gap-5" id="recipe-grid">
                <!-- Javascript 바인딩 -->
            </div>
        </main>
    </div>

    <!-- 1. 레시피 개요(Overview) 모달 -->
    <dialog id="recipeModal" class="bg-zinc-900 text-white rounded-2xl shadow-2xl border border-zinc-700 p-0 w-[95%] max-w-2xl m-auto overflow-hidden relative z-50">
        <div id="rm-header" class="p-4 sm:p-5 border-b border-zinc-800 flex justify-between items-start relative">
            <div class="absolute inset-0 opacity-10" id="rm-bg" style="background: linear-gradient(180deg, transparent 0%, #6366f1 100%);"></div>
            <div class="relative z-10 w-full pr-8">
                <h2 id="rm-title" class="text-lg sm:text-xl font-bold mb-1 leading-tight">레시피 제목</h2>
                <div class="text-xs text-zinc-400 flex flex-wrap gap-2 items-center">
                    <span id="rm-author">👤 작성자</span>
                    <span class="text-zinc-600">|</span>
                    <span id="rm-dripper" class="px-2 py-0.5 bg-zinc-800 rounded border border-zinc-700">도구</span>
                    <span id="rm-beans" class="px-2 py-0.5 bg-zinc-800 rounded border border-zinc-700">20g</span>
                    <span id="rm-temp" class="px-2 py-0.5 bg-zinc-800 rounded border border-zinc-700">93°C</span>
                </div>
            </div>
            <button onclick="document.getElementById('recipeModal').close()" class="relative z-10 text-zinc-400 hover:text-white p-2 rounded-lg bg-zinc-800/80">✖</button>
        </div>
        
        <div class="p-4 sm:p-6 flex flex-col gap-4 sm:gap-6 max-h-[70vh] overflow-y-auto">
            <!-- 추출 의도 영역 -->
            <div class="bg-zinc-800/50 p-4 rounded-xl border border-zinc-700/50">
                <h3 class="text-xs font-bold text-zinc-400 mb-2 flex items-center gap-1">💡 추출 의도 (Overview)</h3>
                <p id="rm-desc" class="text-sm text-zinc-200 leading-relaxed break-keep">이 레시피에 대한 설명이 없습니다.</p>
            </div>

            <!-- 그래프 영역 -->
            <div class="h-32 sm:h-48 bg-black/40 rounded-xl relative overflow-hidden flex items-end p-2 border border-zinc-800/80">
                <svg id="rm-svg" class="w-full h-full absolute inset-0 drop-shadow-md" viewBox="0 0 100 50" preserveAspectRatio="none">
                    <!-- JS에서 path 주입 -->
                </svg>
            </div>
        </div>

        <div class="p-4 border-t border-zinc-800 bg-zinc-900 flex justify-end">
            <button id="rm-start-btn" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl text-sm font-bold transition-all shadow-lg flex justify-center items-center gap-2">
                🚀 이 레시피로 추출하기
            </button>
        </div>
    </dialog>

    <!-- 2. 내 기록 공유하기 모달 -->
    <dialog id="shareModal" class="bg-zinc-900 text-white rounded-2xl shadow-2xl border border-zinc-700 p-0 w-[95%] max-w-lg m-auto overflow-hidden relative z-50">
        <div class="p-4 sm:p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-800/50">
            <h2 class="text-base sm:text-lg font-bold flex items-center gap-2">나의 추출 기록 공유하기</h2>
            <button onclick="document.getElementById('shareModal').close()" class="text-zinc-400 hover:text-white p-2 rounded-lg bg-zinc-800/80">✖</button>
        </div>
        
        <!-- 단계 1: 선택 화면 -->
        <div id="modal-step-1" class="p-4 sm:p-6 flex flex-col gap-3 sm:gap-4">
            <button onclick="window.location.href='Ttara-Pour.html'" class="p-5 sm:p-6 bg-zinc-800 hover:bg-zinc-700 rounded-xl border border-zinc-700 flex flex-col items-center gap-2 sm:gap-3 transition-colors text-center">
                <span class="text-2xl sm:text-3xl">⚖️</span>
                <span class="font-bold text-white text-base sm:text-lg">스마트 저울과 연동하기</span>
                <span class="text-[11px] sm:text-xs text-zinc-400">저울과 연결하여 실시간으로 자유롭게 내린 추출 데이터를 기록합니다.</span>
            </button>
            <button onclick="document.getElementById('modal-step-1').classList.add('hidden'); document.getElementById('modal-step-2').classList.remove('hidden');" class="p-5 sm:p-6 bg-zinc-800 hover:bg-zinc-700 rounded-xl border border-zinc-700 flex flex-col items-center gap-2 sm:gap-3 transition-colors text-center">
                <span class="text-2xl sm:text-3xl">📝</span>
                <span class="font-bold text-white text-base sm:text-lg">레시피 수동 입력 / AI 추출</span>
                <span class="text-[11px] sm:text-xs text-zinc-400">레시피를 직접 기입하거나, 유튜브 링크를 통해 AI가 자동으로 작성합니다.</span>
            </button>
        </div>

        <!-- 단계 2: 레시피 입력 폼 -->
        <div id="modal-step-2" class="hidden">
            <!-- 유튜브 AI 영역 -->
            <div class="px-4 sm:px-6 pt-4 sm:pt-5 pb-2 border-b border-zinc-800">
                <div class="bg-indigo-500/10 border border-indigo-500/30 p-3 sm:p-4 rounded-xl flex flex-col gap-2">
                    <h3 class="text-xs font-bold text-indigo-400 flex items-center gap-1.5">✨ 유튜브 AI 레시피 자동 완성</h3>
                    <input type="text" id="yt-url" placeholder="유튜브 링크 (https://youtube.com/...)" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-xs sm:text-sm text-white focus:border-indigo-500 outline-none">
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input type="password" id="gemini-key" placeholder="Gemini API Key (입력시 자동저장)" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-xs text-white focus:border-indigo-500 outline-none">
                        <button type="button" id="btn-ai-extract" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-xs font-bold transition-colors">AI 분석</button>
                    </div>
                    <p class="text-[10px] text-zinc-500">※ 구글 AI Studio에서 무료 API 키를 발급받아 입력하세요.</p>
                </div>
            </div>

            <form id="recipe-form" class="p-4 sm:p-6 flex flex-col gap-4 max-h-[50vh] sm:max-h-[60vh] overflow-y-auto">
                <div>
                    <label class="block text-xs font-bold text-zinc-400 mb-1.5">레시피 이름 (프로파일 명)</label>
                    <input type="text" id="f-title" placeholder="예: 단맛을 끌어올리는 케냐 AA" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white focus:border-indigo-500" required>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-zinc-400 mb-1.5">기여자 (이름)</label>
                        <input type="text" id="f-author" placeholder="닉네임" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white focus:border-indigo-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-zinc-400 mb-1.5">관리용 비밀번호</label>
                        <input type="password" id="f-pw" placeholder="삭제시 필요" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white focus:border-indigo-500" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-zinc-400 mb-1.5">사용 기물 (도구)</label>
                        <input type="text" id="f-dripper" placeholder="V60, 칼리타 등" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white focus:border-indigo-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-zinc-400 mb-1.5 flex justify-between">
                            <span>원두량 (g) / 온도(°C)</span>
                            <span id="temp-indicator" class="text-blue-400 text-[10px]">Cold</span>
                        </label>
                        <div class="flex gap-2">
                            <input type="number" id="f-beans" placeholder="g" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-2 py-2 text-sm text-white text-center" required>
                            <input type="number" id="f-temp" placeholder="°C" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-2 py-2 text-sm text-white text-center" required>
                        </div>
                    </div>
                </div>
                
                <div class="w-full h-1.5 rounded-full temp-gradient mb-1 opacity-50"></div>

                <div>
                    <label class="block text-xs font-bold text-zinc-400 mb-1.5">추출 의도 (설명)</label>
                    <textarea id="f-desc" rows="2" placeholder="이 레시피가 타겟팅하는 맛이나 주의사항을 적어주세요." class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-xs text-white focus:border-indigo-500 resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold text-zinc-400 mb-1.5 flex justify-between items-end">
                        <span>상세 추출 스텝 (JSON 구조)</span>
                        <span class="text-[10px] text-zinc-500 font-normal">붓고 기다리는(계단형) 데이터 입력</span>
                    </label>
                    <textarea id="f-steps" rows="5" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-[11px] sm:text-xs text-indigo-300 font-mono focus:border-indigo-500 resize-none leading-relaxed" required>
[
  {"t": 0, "w": 0},
  {"t": 10, "w": 50},
  {"t": 40, "w": 50},
  {"t": 50, "w": 150},
  {"t": 80, "w": 150},
  {"t": 90, "w": 250}
]</textarea>
                </div>

                <div class="mt-2 flex gap-2 sm:gap-3">
                    <button type="button" onclick="document.getElementById('modal-step-2').classList.add('hidden'); document.getElementById('modal-step-1').classList.remove('hidden');" class="flex-1 bg-zinc-800 hover:bg-zinc-700 text-white px-3 sm:px-4 py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-colors">이전으로</button>
                    <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white px-3 sm:px-4 py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all shadow-lg shadow-indigo-500/25">저장하기</button>
                </div>
            </form>
        </div>
    </dialog>

    <div id="toast" class="fixed bottom-6 sm:bottom-10 left-1/2 -translate-x-1/2 bg-zinc-800 text-white px-5 sm:px-6 py-2.5 sm:py-3 rounded-full shadow-2xl border border-zinc-700 opacity-0 transition-opacity duration-300 z-[100] pointer-events-none text-xs sm:text-sm font-medium whitespace-nowrap">메시지</div>

    <script>
        const gridEl = document.getElementById('recipe-grid');
        const fTemp = document.getElementById('f-temp');
        const tempIndicator = document.getElementById('temp-indicator');
        const toast = document.getElementById('toast');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-sidebar-overlay');

        // 모바일 사이드바 토글
        function toggleMobileSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // 공유 모달 초기화 및 열기
        function openShareModal() {
            document.getElementById('modal-step-1').classList.remove('hidden');
            document.getElementById('modal-step-2').classList.add('hidden');
            document.getElementById('shareModal').showModal();
        }

        // 온도 시각화
        fTemp.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            if(isNaN(val)) return tempIndicator.textContent = '';
            if(val >= 90) { tempIndicator.textContent = 'Hot'; tempIndicator.className = 'text-red-400 text-[10px]'; }
            else if(val >= 80) { tempIndicator.textContent = 'Warm'; tempIndicator.className = 'text-orange-400 text-[10px]'; }
            else if(val >= 70) { tempIndicator.textContent = 'Mild'; tempIndicator.className = 'text-yellow-400 text-[10px]'; }
            else { tempIndicator.textContent = 'Cold'; tempIndicator.className = 'text-blue-400 text-[10px]'; }
        });

        function showToast(msg) {
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        // 기본 목업 데이터 (계단형으로 수정됨)
        const mockRecipes = [
            { id: 'm1_v3', title: '클래식 V60 스탠다드', author: '부쿠마스터', dripper: 'V60', beans: 15, temp: 93, likes: 120, color: '#ef4444', desc: "가장 기본적인 푸어오버 레시피입니다. 3번에 걸쳐 물을 나누어 부어 밸런스 있는 수율을 이끌어냅니다.", steps: [{t:0,w:0}, {t:10,w:50}, {t:40,w:50}, {t:50,w:150}, {t:90,w:150}, {t:100,w:250}] },
            { id: 'm2_v3', title: '아이스 드립 필살기', author: '얼죽아', dripper: 'Kalita', beans: 20, temp: 88, likes: 85, color: '#3b82f6', desc: "얼음 120g을 서버에 미리 깔아두고 추출하는 아이스 전용 레시피입니다. 산미와 단맛을 타겟팅합니다.", steps: [{t:0,w:0}, {t:10,w:60}, {t:40,w:60}, {t:50,w:180}] },
            { id: 'm3_v3', title: '에스프레소 기본 추출', author: '머신매니아', dripper: 'Espresso', beans: 18, temp: 95, likes: 200, color: '#f59e0b', desc: "머신 추출을 위한 표준 프로파일입니다. 프리인퓨전을 길게 가져가 채널링을 방지합니다.", steps: [{t:0,w:0}, {t:5,w:2}, {t:10,w:5}, {t:30,w:36}] },
            { id: 'm4_v3', title: '4:6 카스야 메소드', author: '커피러버', dripper: 'V60', beans: 20, temp: 90, likes: 55, color: '#10b981', desc: "초반 40% 물로 산미와 단맛을 결정하고, 후반 60% 물로 농도를 조절하는 테츠 카스야 바리스타의 유명한 메소드입니다.", steps: [{t:0,w:0}, {t:10,w:50}, {t:45,w:50}, {t:55,w:120}, {t:90,w:120}, {t:100,w:180}, {t:135,w:180}, {t:145,w:240}, {t:180,w:240}, {t:190,w:300}] }
        ];

        // 데이터 로드
        function getRecipes() {
            let data = localStorage.getItem('buku_recipes');
            if(!data || !data.includes('"m1_v3"')) { // 업데이트 강제 적용
                localStorage.setItem('buku_recipes', JSON.stringify(mockRecipes));
                return mockRecipes;
            }
            return JSON.parse(data);
        }

        function generatePath(steps) {
            if (!steps || steps.length === 0) return 'M0,50 L100,50';
            let path = 'M0,50 ';
            const maxT = steps[steps.length - 1].t || 1;
            const maxW = steps[steps.length - 1].w || 1;
            steps.forEach(s => {
                const x = (s.t / maxT) * 100;
                const y = 50 - (s.w / maxW) * 50;
                path += `L${x},${y} `;
            });
            return path;
        }

        // 필터 로직
        function filterRecipes(recipes) {
            const checkedDrippers = Array.from(document.querySelectorAll('#filter-dripper input:checked')).map(el => el.value.toLowerCase());
            const checkedTemps = Array.from(document.querySelectorAll('#filter-temp input:checked')).map(el => el.value);

            return recipes.filter(r => {
                let dripperMatch = true;
                if(checkedDrippers.length > 0) {
                    dripperMatch = checkedDrippers.some(d => r.dripper.toLowerCase().includes(d));
                }

                let tempMatch = true;
                if(checkedTemps.length > 0) {
                    tempMatch = checkedTemps.some(cond => {
                        const t = r.temp;
                        if(cond === 'hot90' && t >= 90) return true;
                        if(cond === 'hot80' && t >= 80 && t < 90) return true;
                        if(cond === 'mid70' && t >= 70 && t < 80) return true;
                        if(cond === 'low70' && t > 25 && t < 70) return true;
                        if(cond === 'cold' && t <= 25) return true;
                        return false;
                    });
                }
                return dripperMatch && tempMatch;
            });
        }

        // 레시피 상세 모달 열기
        function openRecipeModal(recipeId) {
            const recipes = getRecipes();
            const r = recipes.find(x => x.id === recipeId);
            if(!r) return;

            document.getElementById('rm-title').textContent = r.title;
            document.getElementById('rm-author').textContent = `👤 ${r.author}`;
            document.getElementById('rm-dripper').textContent = r.dripper;
            document.getElementById('rm-beans').textContent = `${r.beans}g`;
            document.getElementById('rm-temp').textContent = `${r.temp}°C`;
            
            document.getElementById('rm-desc').textContent = r.desc || "상세 추출 설명이 등록되지 않은 레시피입니다.";
            document.getElementById('rm-bg').style.background = `linear-gradient(180deg, transparent 0%, ${r.color || '#6366f1'} 100%)`;
            
            const path = generatePath(r.steps);
            document.getElementById('rm-svg').innerHTML = `<path d="${path}" fill="none" stroke="${r.color || '#6366f1'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="graph-line"></path>`;

            document.getElementById('rm-start-btn').onclick = () => window.location.href = `Ttara-Pour.html?recipeId=${r.id}`;
            document.getElementById('recipeModal').showModal();
        }

        function renderRecipes() {
            const allRecipes = getRecipes();
            const filtered = filterRecipes(allRecipes);
            
            gridEl.innerHTML = '';
            if(filtered.length === 0) {
                gridEl.innerHTML = '<div class="col-span-full text-center py-10 text-zinc-500">조건에 맞는 레시피가 없습니다.</div>';
                return;
            }

            filtered.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'glass-panel rounded-2xl overflow-hidden hover:border-indigo-500/50 transition-all duration-300 group flex flex-col relative cursor-pointer active:scale-[0.98]';
                card.onclick = () => openRecipeModal(recipe.id); // 오버뷰 모달 열기
                
                const timeStr = recipe.steps && recipe.steps.length > 0 ? recipe.steps[recipe.steps.length-1].t + 's' : '-';
                const maxWater = recipe.steps && recipe.steps.length > 0 ? recipe.steps[recipe.steps.length-1].w : '-';
                const path = generatePath(recipe.steps);
                const color = recipe.color || '#6366f1';

                card.innerHTML = `
                    <div class="h-24 sm:h-28 bg-zinc-900/50 relative overflow-hidden flex items-end p-2 border-b border-zinc-800">
                        <div class="absolute inset-0 opacity-20" style="background: linear-gradient(180deg, transparent 0%, ${color} 100%);"></div>
                        <svg class="w-full h-full absolute inset-0 drop-shadow-md" viewBox="0 0 100 50" preserveAspectRatio="none">
                            <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                        <div class="absolute top-2 right-2 bg-black/60 backdrop-blur rounded px-2 py-0.5 text-[10px] text-white font-mono border border-zinc-700">${timeStr}</div>
                    </div>
                    <div class="p-3 sm:p-4 flex-1 flex flex-col">
                        <h3 class="text-sm font-bold text-white line-clamp-1 mb-1 group-hover:text-indigo-400 transition-colors">${recipe.title}</h3>
                        <div class="text-[11px] sm:text-xs text-zinc-400 mb-2 sm:mb-3">👤 ${recipe.author}</div>
                        <div class="flex flex-wrap gap-1 sm:gap-1.5 mb-3 sm:mb-4">
                            <span class="px-1.5 sm:px-2 py-0.5 bg-zinc-800 text-zinc-300 rounded text-[9px] sm:text-[10px] font-medium border border-zinc-700">${recipe.dripper}</span>
                            <span class="px-1.5 sm:px-2 py-0.5 bg-zinc-800 text-zinc-300 rounded text-[9px] sm:text-[10px] font-medium border border-zinc-700">${recipe.beans}g : ${maxWater}g</span>
                            <span class="px-1.5 sm:px-2 py-0.5 border rounded text-[9px] sm:text-[10px] font-medium" style="color:${color}; border-color:${color}40; background-color:${color}10">${recipe.temp}°C</span>
                        </div>
                    </div>
                `;
                gridEl.appendChild(card);
            });
        }

        // 필터 이벤트 바인딩
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.addEventListener('change', renderRecipes));
        
        window.resetFilters = () => {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            renderRecipes();
        }

        // API 키 로컬 스토리지 저장/불러오기
        const keyInput = document.getElementById('gemini-key');
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) keyInput.value = savedKey;
        keyInput.addEventListener('change', (e) => localStorage.setItem('gemini_api_key', e.target.value));

        // 유튜브 AI 분석 로직
        document.getElementById('btn-ai-extract').addEventListener('click', async () => {
            const url = document.getElementById('yt-url').value;
            const apiKey = keyInput.value;
            
            if (!url) return showToast('유튜브 링크를 입력해주세요.');
            if (!apiKey) return showToast('Gemini API Key를 입력해주세요.');

            const btn = document.getElementById('btn-ai-extract');
            btn.textContent = '분석중...';
            btn.disabled = true;
            showToast("AI가 영상을 분석 중입니다... ☕ (약 5~10초 소요)");

            const systemPrompt = `당신은 바리스타 AI입니다. 유튜브 링크 내용에서 커피 레시피를 분석해 JSON으로 응답하세요. 추출은 물을 붓고 기다리는(뜸 들이기 등) 계단형입니다.
            {
              "title": "레시피 제목",
              "author": "유튜버",
              "desc": "영상에서 바리스타가 강조하는 추출의 핵심 목표나 맛의 특징, 주의사항 등을 2문장 내외로 요약.",
              "dripper": "추출 기구",
              "beans": 15,
              "temp": 93,
              "steps": [ {"t": 0, "w": 0}, {"t": 10, "w": 50}, {"t": 40, "w": 50}, {"t": 50, "w": 150} ]
            }
            마크다운 없이 순수한 JSON만 반환하세요. 영상 내용 파악이 어려우면 위와 같은 뜸 들이기가 포함된 표준 가상 레시피를 만들어주세요.`;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000); // 15초 제한
                
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `유튜브 영상 링크: ${url}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error('API 호출 실패');
                const result = await response.json();
                let text = result.candidates[0].content.parts[0].text;
                
                text = text.replace(/```json/g, '').replace(/```/g, '').trim();
                const recipeData = JSON.parse(text);

                if(recipeData.title) document.getElementById('f-title').value = recipeData.title;
                if(recipeData.author) document.getElementById('f-author').value = recipeData.author;
                if(recipeData.desc) document.getElementById('f-desc').value = recipeData.desc;
                if(recipeData.dripper) document.getElementById('f-dripper').value = recipeData.dripper;
                if(recipeData.beans) document.getElementById('f-beans').value = recipeData.beans;
                if(recipeData.temp) {
                    const tInput = document.getElementById('f-temp');
                    tInput.value = recipeData.temp;
                    tInput.dispatchEvent(new Event('input')); 
                }
                if(recipeData.steps) {
                    document.getElementById('f-steps').value = JSON.stringify(recipeData.steps, null, 2);
                }
                
                showToast("✨ AI 분석 완료! 내용을 확인해주세요.");
            } catch (error) {
                console.error(error);
                showToast("AI 분석에 실패했습니다. 키 오류이거나 영상 분석 불가입니다.");
            } finally {
                btn.textContent = 'AI 분석';
                btn.disabled = false;
            }
        });

        // 새 레시피 등록
        document.getElementById('recipe-form').addEventListener('submit', (e) => {
            e.preventDefault();
            let stepsParsed;
            try {
                stepsParsed = JSON.parse(document.getElementById('f-steps').value);
                if (!Array.isArray(stepsParsed)) throw new Error();
            } catch (err) {
                return showToast('스텝(JSON) 형식이 잘못되었습니다.');
            }

            const temp = Number(document.getElementById('f-temp').value);
            let color = '#6366f1';
            if(temp >= 90) color = '#ef4444';
            else if(temp >= 80) color = '#f97316';
            else if(temp >= 70) color = '#eab308';
            else color = '#3b82f6';

            const newRecipe = {
                id: 'id_' + Date.now(),
                title: document.getElementById('f-title').value,
                author: document.getElementById('f-author').value,
                desc: document.getElementById('f-desc').value,
                password: document.getElementById('f-pw').value,
                dripper: document.getElementById('f-dripper').value,
                beans: Number(document.getElementById('f-beans').value),
                temp: temp,
                steps: stepsParsed,
                likes: 0,
                color: color
            };

            const recipes = getRecipes();
            recipes.unshift(newRecipe);
            localStorage.setItem('buku_recipes', JSON.stringify(recipes));
            
            showToast('✅ 레시피가 커뮤니티에 등록되었습니다!');
            document.getElementById('shareModal').close();
            document.getElementById('recipe-form').reset();
            renderRecipes();
        });

        // 초기 렌더링
        renderRecipes();
    </script>
</body>
</html>
