<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ttara-Pour Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', 'Pretendard', sans-serif; background-color: #09090b; color: #f8fafc; }
        dialog::backdrop { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="p-4 sm:p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b border-zinc-800 pb-4 gap-4">
            <div>
                <h1 class="text-xl sm:text-2xl font-bold text-white flex items-center gap-2">
                    <span class="text-rose-500">🛡️</span> Ttara-Pour Admin
                </h1>
                <p class="text-[11px] sm:text-sm text-zinc-400 mt-1">로컬 스토리지에 저장된 레시피 및 추출 기물 통합 관리</p>
            </div>
            <button onclick="window.location.href='index.html'" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-lg text-xs sm:text-sm transition-colors whitespace-nowrap">커뮤니티로 돌아가기</button>
        </header>

        <!-- 탭 네비게이션 -->
        <div class="flex gap-4 mb-6 border-b border-zinc-800 pb-2">
            <button id="tab-btn-recipes" onclick="switchTab('recipes')" class="text-rose-400 font-bold px-3 py-1.5 border-b-2 border-rose-500 transition-colors text-sm">레시피 관리</button>
            <button id="tab-btn-equip" onclick="switchTab('equip')" class="text-zinc-500 font-bold px-3 py-1.5 hover:text-white transition-colors text-sm">추출 기물 관리</button>
        </div>

        <!-- 1. 레시피 관리 섹션 -->
        <div id="sec-recipes" class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-x-auto shadow-2xl">
            <table class="w-full text-left text-xs sm:text-sm text-zinc-400 min-w-[600px]">
                <thead class="bg-zinc-800/50 text-[10px] sm:text-xs uppercase text-zinc-300">
                    <tr>
                        <th class="px-4 sm:px-6 py-3">레시피명</th>
                        <th class="px-4 sm:px-6 py-3">기여자</th>
                        <th class="px-4 sm:px-6 py-3">기물</th>
                        <th class="px-4 sm:px-6 py-3">원두/온도</th>
                        <th class="px-4 sm:px-6 py-3 text-right">관리</th>
                    </tr>
                </thead>
                <tbody id="admin-tbody" class="divide-y divide-zinc-800/50">
                    <!-- Javascript Data -->
                </tbody>
            </table>
        </div>

        <!-- 2. 추출 기물(도구) 관리 섹션 -->
        <div id="sec-equip" class="hidden bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden shadow-2xl p-4 sm:p-6">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 gap-4">
                <div>
                    <h3 class="text-base sm:text-lg font-bold text-white">등록된 기물 목록</h3>
                    <p class="text-[10px] sm:text-xs text-zinc-400 mt-1">이곳에 등록된 기물은 레시피 작성 시 자동완성으로 추천됩니다.</p>
                </div>
                <div class="flex gap-2 w-full sm:w-auto">
                    <input type="text" id="new-equip-input" placeholder="새 기물 이름 입력" class="flex-1 sm:w-auto bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-xs sm:text-sm text-white focus:outline-none focus:border-rose-500">
                    <button onclick="addEquip()" class="bg-rose-600 hover:bg-rose-500 text-white px-3 sm:px-4 py-2 rounded-lg text-xs sm:text-sm font-bold transition-colors whitespace-nowrap">목록 추가</button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs sm:text-sm text-zinc-400 border border-zinc-800 rounded-lg overflow-hidden min-w-[300px]">
                    <thead class="bg-zinc-800/50 text-[10px] sm:text-xs uppercase text-zinc-300">
                        <tr>
                            <th class="px-4 sm:px-6 py-3">기물(도구) 명칭</th>
                            <th class="px-4 sm:px-6 py-3 text-right">관리</th>
                        </tr>
                    </thead>
                    <tbody id="equip-tbody" class="divide-y divide-zinc-800/50">
                        <!-- Javascript Data -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 삭제 모달 -->
    <dialog id="deleteModal" class="bg-zinc-900 text-white rounded-2xl shadow-2xl border border-zinc-700 p-5 sm:p-6 w-[90%] max-w-sm m-auto">
        <h3 class="text-base sm:text-lg font-bold mb-2 text-rose-400">레시피 삭제</h3>
        <p class="text-xs sm:text-sm text-zinc-400 mb-4">해당 레시피를 삭제하려면 작성 시 입력한 비밀번호를 확인해주세요.</p>
        <input type="password" id="del-pw" placeholder="비밀번호" class="w-full bg-black/50 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white mb-4 outline-none focus:border-rose-500">
        <div class="flex gap-2">
            <button onclick="document.getElementById('deleteModal').close()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-2 rounded-xl text-sm transition-colors">취소</button>
            <button id="btn-confirm-delete" class="flex-1 bg-rose-600 hover:bg-rose-500 py-2 rounded-xl text-sm font-bold transition-colors">삭제하기</button>
        </div>
    </dialog>

    <script>
        let currentDeleteId = null;
        let currentDeletePw = null;

        function loadAdminData() {
            const tbody = document.getElementById('admin-tbody');
            const data = localStorage.getItem('ttara_recipes');
            
            if(!data || JSON.parse(data).length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-zinc-500 text-xs sm:text-sm">등록된 레시피가 없습니다.</td></tr>';
                return;
            }

            const recipes = JSON.parse(data);
            tbody.innerHTML = '';
            
            recipes.forEach((recipe) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-zinc-800/30 transition-colors";
                tr.innerHTML = `
                    <td class="px-4 sm:px-6 py-3 sm:py-4 font-medium text-white">${recipe.title}</td>
                    <td class="px-4 sm:px-6 py-3 sm:py-4">${recipe.author}</td>
                    <td class="px-4 sm:px-6 py-3 sm:py-4">${recipe.dripper}</td>
                    <td class="px-4 sm:px-6 py-3 sm:py-4">${recipe.beans}g / ${recipe.temp}°C</td>
                    <td class="px-4 sm:px-6 py-3 sm:py-4 text-right">
                        ${recipe.id.startsWith('m') ? 
                            '<span class="text-[10px] sm:text-xs text-zinc-600">기본 제공</span>' : 
                            `<button class="text-[10px] sm:text-xs bg-rose-500/10 text-rose-400 hover:bg-rose-500 hover:text-white px-2 sm:px-3 py-1 sm:py-1.5 rounded transition-colors del-btn" data-id="${recipe.id}" data-pw="${recipe.password}">삭제</button>`
                        }
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentDeleteId = e.target.dataset.id;
                    currentDeletePw = e.target.dataset.pw;
                    document.getElementById('del-pw').value = '';
                    document.getElementById('deleteModal').showModal();
                });
            });
        }

        document.getElementById('btn-confirm-delete').addEventListener('click', () => {
            const inputPw = document.getElementById('del-pw').value;
            if(inputPw !== currentDeletePw) {
                alert("비밀번호가 일치하지 않습니다.");
                document.getElementById('del-pw').value = '';
                return;
            }
            
            let recipes = JSON.parse(localStorage.getItem('ttara_recipes'));
            recipes = recipes.filter(r => r.id !== currentDeleteId);
            localStorage.setItem('ttara_recipes', JSON.stringify(recipes));
            
            document.getElementById('deleteModal').close();
            loadAdminData();
        });

        function switchTab(tab) {
            const btnRecipes = document.getElementById('tab-btn-recipes');
            const btnEquip = document.getElementById('tab-btn-equip');
            const secRecipes = document.getElementById('sec-recipes');
            const secEquip = document.getElementById('sec-equip');

            if (tab === 'recipes') {
                btnRecipes.className = "text-rose-400 font-bold px-3 py-1.5 border-b-2 border-rose-500 transition-colors text-sm";
                btnEquip.className = "text-zinc-500 font-bold px-3 py-1.5 hover:text-white transition-colors text-sm";
                secRecipes.classList.remove('hidden');
                secEquip.classList.add('hidden');
                loadAdminData();
            } else {
                btnEquip.className = "text-rose-400 font-bold px-3 py-1.5 border-b-2 border-rose-500 transition-colors text-sm";
                btnRecipes.className = "text-zinc-500 font-bold px-3 py-1.5 hover:text-white transition-colors text-sm";
                secEquip.classList.remove('hidden');
                secRecipes.classList.add('hidden');
                loadEquipments();
            }
        }

        function loadEquipments() {
            const tbody = document.getElementById('equip-tbody');
            let list = JSON.parse(localStorage.getItem('ttara_equipment') || '[]');
            
            if(list.length === 0) {
                list = ['Hario V60', 'Kalita Wave', 'Origami', 'Aeropress', 'Orea V3', 'NextLevel Pulsar', 'Hario Switch'];
                localStorage.setItem('ttara_equipment', JSON.stringify(list));
            }

            tbody.innerHTML = '';
            list.sort().forEach(eq => {
                tbody.innerHTML += `
                    <tr class="hover:bg-zinc-800/30 transition-colors">
                        <td class="px-4 sm:px-6 py-3 sm:py-4 font-medium text-white">${eq}</td>
                        <td class="px-4 sm:px-6 py-3 sm:py-4 text-right">
                            <button class="text-[10px] sm:text-xs bg-rose-500/10 text-rose-400 hover:bg-rose-500 hover:text-white px-2 sm:px-3 py-1 sm:py-1.5 rounded transition-colors" onclick="deleteEquip('${eq}')">삭제</button>
                        </td>
                    </tr>
                `;
            });
        }

        window.addEquip = function() {
            const val = document.getElementById('new-equip-input').value.trim();
            if(!val) return;
            let list = JSON.parse(localStorage.getItem('ttara_equipment') || '[]');
            
            if(!list.includes(val)) {
                list.push(val);
                localStorage.setItem('ttara_equipment', JSON.stringify(list));
                document.getElementById('new-equip-input').value = '';
                loadEquipments();
            } else {
                alert('이미 등록된 기물입니다.');
            }
        }

        window.deleteEquip = function(name) {
            if(confirm(`정말로 '${name}' 기물을 목록에서 삭제하시겠습니까?`)) {
                let list = JSON.parse(localStorage.getItem('ttara_equipment') || '[]');
                list = list.filter(e => e !== name);
                localStorage.setItem('ttara_equipment', JSON.stringify(list));
                loadEquipments();
            }
        }

        loadAdminData();
    </script>
</body>
</html>
